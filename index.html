<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css" type="text/css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    #movableImage {
      position: absolute;
      width: 100px;
      height: 100px;
      background-color: transparent;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      cursor: grab;
      user-select: none;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    
    #movableImage:active {
      cursor: grabbing;
    }
    
    #movableImage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header class="hero"></header>
  <main>
    <section class="features"></section>
    <section class="testimonials"></section>
    <section class="pricing"></section>
    <section class="faq"></section>
  </main>
  <footer class="site-footer"></footer>
  
  <div id="movableImage">
    <img src="assets/characters/player/wide-guard-merchant.png" alt="wide-guard-merchant">
  </div>

  <script>
    const image = document.getElementById('movableImage');
    let x = window.innerWidth / 2 - 50;
    let y = window.innerHeight / 2 - 50;
    const speed = 10;
    const keys = {};

    // Track which keys are pressed
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Animation loop
    function updatePosition() {
      if (keys['w']) y -= speed;
      if (keys['a']) x -= speed;
      if (keys['s']) y += speed;
      if (keys['d']) x += speed;

      // Keep within bounds
      x = Math.max(0, Math.min(x, window.innerWidth - 100));
      y = Math.max(0, Math.min(y, window.innerHeight - 100));

      image.style.left = x + 'px';
      image.style.top = y + 'px';

      requestAnimationFrame(updatePosition);
    }

    updatePosition();
  </script>
</body>
</html>
